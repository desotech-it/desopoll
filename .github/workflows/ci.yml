name: build-and-push

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: r.deso.tech
  PROJECT: desopoll

jobs:
  # Gate: unit tests + type-check both packages. Images/chart only build if this passes.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Enforce 500-line file cap (no monoliths)
        run: |
          big=$(find backend/src frontend/src -type f \( -name '*.ts' -o -name '*.tsx' \) \
            | xargs wc -l | awk '$2!="total" && $1>500 {print}')
          if [ -n "$big" ]; then echo "Source files over 500 lines:"; echo "$big"; exit 1; fi
          echo "OK — every source file is within the 500-line cap."
      - name: Backend — install, typecheck, test
        working-directory: backend
        run: |
          npm ci
          npm run build
          npm test
      - name: Frontend — install, typecheck/build, test
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npm test --if-present

  images:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to r.deso.tech
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.PROJECT }}/${{ matrix.component }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  chart:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: Determine chart version
        id: ver
        run: |
          BASE=$(grep '^version:' deploy/helm/desopoll/Chart.yaml | awk '{print $2}')
          if [ "${{ github.ref_type }}" = "tag" ]; then V="${{ github.ref_name }}"; V="${V#v}"; else V="${BASE}-${{ github.run_number }}"; fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
      - name: Package and push chart (OCI)
        env:
          RU: ${{ secrets.REGISTRY_USERNAME }}
          RP: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          # Pass creds via env vars (not GitHub expression interpolation) so the literal
          # '$' in a robot account name like robot$desopoll is not shell-expanded away.
          printf '%s' "$RP" | helm registry login "$REGISTRY" -u "$RU" --password-stdin
          helm package deploy/helm/desopoll --version "${{ steps.ver.outputs.version }}" --app-version "${{ steps.ver.outputs.version }}"
          helm push "desopoll-${{ steps.ver.outputs.version }}.tgz" "oci://$REGISTRY/$PROJECT/charts"
