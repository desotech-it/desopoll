{{- if eq .Values.gateway.mode "attach" }}
{{- /* Allow the shared gateway (in another namespace) to use our TLS secret. */ -}}
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: desopoll-gateway-to-tls
  labels:
    app.kubernetes.io/part-of: desopoll
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: Gateway
      namespace: {{ .Values.gateway.namespace }}
  to:
    - group: ""
      kind: Secret
      name: {{ .Values.tls.secretName }}
{{- end }}
