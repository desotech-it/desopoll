apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: desopoll
  labels:
    app.kubernetes.io/part-of: desopoll
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
  hostnames:
    - {{ .Values.hostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ if .Values.echo.enabled }}desopoll-echo{{ else }}desopoll-frontend{{ end }}
          port: 80
