apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: desopoll
  labels:
    app.kubernetes.io/part-of: desopoll
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
  hostnames:
    - {{ .Values.hostname | quote }}
  rules:
{{- if .Values.backend.enabled }}
    - matches:
        - path:
            type: PathPrefix
            value: /api
        - path:
            type: PathPrefix
            value: /ws
      backendRefs:
        - name: desopoll-backend
          port: 8080
{{- end }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
{{- if .Values.frontend.enabled }}
        - name: desopoll-frontend
          port: 80
{{- else if .Values.echo.enabled }}
        - name: desopoll-echo
          port: 80
{{- else }}
        - name: desopoll-backend
          port: 8080
{{- end }}
