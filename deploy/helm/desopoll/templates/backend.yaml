{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: desopoll-backend
  labels:
    app.kubernetes.io/name: desopoll-backend
    app.kubernetes.io/part-of: desopoll
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: desopoll-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: desopoll-backend
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      initContainers:
        - name: migrate
          image: {{ .Values.image.registry }}/desopoll-backend:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["node", "dist/migrate.js"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.cluster }}-app
                  key: uri
      containers:
        - name: backend
          image: {{ .Values.image.registry }}/desopoll-backend:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.db.cluster }}-app
                  key: uri
            - name: REDIS_URL
              value: redis://desopoll-redis:6379
            - name: CORS_ORIGINS
              value: {{ .Values.backend.corsOrigins | quote }}
            - name: APP_BASE_URL
              value: {{ .Values.appBaseUrl | quote }}
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.session.secretName }}
                  key: secret
{{- if .Values.oidc.enabled }}
            - name: OIDC_ISSUER
              value: {{ .Values.oidc.issuer | quote }}
            - name: OIDC_REDIRECT_URI
              value: {{ printf "%s/api/auth/callback" (.Values.appBaseUrl | trimSuffix "/") | quote }}
            - name: OIDC_SCOPES
              value: {{ .Values.oidc.scopes | quote }}
            - name: OIDC_GROUPS_CLAIM
              value: {{ .Values.oidc.groupsClaim | quote }}
            - name: OIDC_ADMIN_GROUP
              value: {{ .Values.oidc.adminGroup | quote }}
            - name: OIDC_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oidc.secretName }}
                  key: client_id
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.oidc.secretName }}
                  key: client_secret
{{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: desopoll-backend
  labels:
    app.kubernetes.io/name: desopoll-backend
    app.kubernetes.io/part-of: desopoll
spec:
  selector:
    app.kubernetes.io/name: desopoll-backend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
{{- end }}
