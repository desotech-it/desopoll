{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: desopoll-redis
  labels:
    app.kubernetes.io/name: desopoll-redis
    app.kubernetes.io/part-of: desopoll
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: desopoll-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: desopoll-redis
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          args: ["--save", "", "--appendonly", "no"]
          ports:
            - containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 2
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: desopoll-redis
  labels:
    app.kubernetes.io/name: desopoll-redis
    app.kubernetes.io/part-of: desopoll
spec:
  selector:
    app.kubernetes.io/name: desopoll-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
{{- end }}
