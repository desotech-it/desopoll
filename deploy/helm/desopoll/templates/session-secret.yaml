{{- /* Session cookie signing secret: generated once, preserved across upgrades. */ -}}
{{- $name := .Values.session.secretName }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $value := "" }}
{{- if and $existing $existing.data (index $existing.data "secret") }}
{{- $value = index $existing.data "secret" }}
{{- else }}
{{- $value = randAlphaNum 48 | b64enc }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/part-of: desopoll
type: Opaque
data:
  secret: {{ $value }}
