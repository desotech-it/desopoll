{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: desopoll-frontend
  labels:
    app.kubernetes.io/name: desopoll-frontend
    app.kubernetes.io/part-of: desopoll
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: desopoll-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: desopoll-frontend
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      containers:
        - name: frontend
          image: {{ .Values.image.registry }}/desopoll-frontend:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: desopoll-frontend
  labels:
    app.kubernetes.io/name: desopoll-frontend
    app.kubernetes.io/part-of: desopoll
spec:
  selector:
    app.kubernetes.io/name: desopoll-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
{{- end }}
