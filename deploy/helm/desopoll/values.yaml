# Public hostname served by the dedicated Cilium Gateway
hostname: poll.deso.tech

gateway:
  # "attach" = use an existing shared gateway (poll.deso.tech served by it);
  # "dedicated" = create our own Gateway (needs the edge to route to its own IP).
  mode: attach
  name: labplatform
  namespace: desolabs-labplatform
  className: cilium # only used in "dedicated" mode

tls:
  secretName: poll-deso-tech-tls
  # ACME issuer to use: "staging" (testing, untrusted cert) or "prod"
  issuer: prod

acme:
  email: admin@desotech.io

# Temporary echo backend (superseded by frontend/backend below).
echo:
  enabled: false
  image: nginx:alpine
  replicas: 1

# Container images (built by CI, pushed to GHCR). Override registry/tag as needed.
image:
  # Pushed by CI to the private r.deso.tech registry (cluster nodes can pull it natively).
  registry: r.deso.tech/desopoll
  tag: latest
  pullPolicy: IfNotPresent
  # Private Harbor project → pull via this docker-registry secret (created in deploy.sh).
  pullSecrets:
    - r-deso-tech

# Dedicated Redis in this namespace: volatile live-game state + pub/sub fan-out.
redis:
  enabled: true
  image: redis:7-alpine

backend:
  enabled: true
  replicas: 1
  corsOrigins: https://poll.deso.tech

frontend:
  enabled: true
  replicas: 1

# Public base URL (used for OIDC redirect URI and post-login redirects).
appBaseUrl: https://poll.deso.tech

# Session cookie signing secret — auto-generated and persisted by the chart.
session:
  secretName: desopoll-session

# SSO via OIDC (auth.deso.tech = Authentik). Flip enabled=true after registering the
# OIDC application in Authentik and creating the Secret with the client credentials:
#   kubectl -n desopoll create secret generic desopoll-oidc \
#     --from-literal=client_id=... --from-literal=client_secret=...
# Local email+password login stays available alongside SSO.
oidc:
  enabled: false
  issuer: https://auth.deso.tech/application/o/desopoll/
  scopes: openid email profile
  groupsClaim: groups
  adminGroup: "" # Authentik group name whose members become desopoll admins
  secretName: desopoll-oidc

# Database. "managed" = a dedicated CloudNativePG cluster in THIS namespace (fully
# isolated, the operator generates the <cluster>-app secret with the connection uri).
# "external" = use a manually-provided Secret (deploy.sh db-secret).
db:
  mode: managed
  cluster: desopoll-db
  instances: 1
  image: ghcr.io/cloudnative-pg/postgresql:16
  storageClass: longhorn
  storageSize: 2Gi
  database: desopoll
  owner: desopoll
