# Local development stack. Production runs on Kubernetes (see deploy/).
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: desopoll
      POSTGRES_PASSWORD: desopoll
      POSTGRES_DB: desopoll
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U desopoll"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      NODE_ENV: development
      PORT: "8080"
      DATABASE_URL: postgres://desopoll:desopoll@postgres:5432/desopoll
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: "*"
    command: sh -c "npm run migrate && node dist/index.js"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
